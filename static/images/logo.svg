<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Camera -->
  <rect x="110" y="150" width="290" height="190" rx="25"
        fill="white"/>

  <circle cx="255" cy="245" r="55"
          fill="#2563EB"/>

  <circle cx="255" cy="245" r="25"
          fill="white"/>

  <!-- AI Nodes -->
  <circle cx="140" cy="120" r="10" fill="white"/>
  <circle cx="200" cy="90" r="10" fill="white"/>
  <circle cx="310" cy="90" r="10" fill="white"/>
  <circle cx="370" cy="120" r="10" fill="white"/>

  <line x1="140" y1="120" x2="200" y2="90"
        stroke="white" stroke-width="5"/>

  <line x1="200" y1="90" x2="310" y2="90"
        stroke="white" stroke-width="5"/>

  <line x1="310" y1="90" x2="370" y2="120"
        stroke="white" stroke-width="5"/>

  <!-- Road -->
  <path d="M190 340 L160 470 H352 L322 340"
        fill="#1E293B"/>

  <line x1="256" y1="350" x2="256" y2="460"
        stroke="white"
        stroke-width="8"
        stroke-dasharray="18 14"/>

  <!-- Title -->
  <text x="256"
        y="505"
        text-anchor="middle"
        font-size="32"
        font-family="Arial"
        fill="white"
        font-weight="bold">
        VisionTrace AI
  </text>

</svg>